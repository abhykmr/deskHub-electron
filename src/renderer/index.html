<!doctype html>
<html>
  <head>
    <title>DeskHub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="app-container">
      <header class="top-bar">
        <h1 class="app-title">DeskHub</h1>

        <button id="addButton" class="add-btn">+</button>
      </header>

      <div class="search-container">
        <input id="searchInput" type="text" placeholder="Search apps..." />
      </div>

      <div id="appGrid" class="app-grid"></div>
    </div>

    <!-- Add Web App Modal -->

    <div id="addModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Add Web App</h2>
        </div>

        <div class="modal-body">
          <div class="input-group">
            <label>App Name</label>
            <input id="appName" placeholder="Example: ChatGPT" />
          </div>

          <div class="input-group">
            <label>Website URL</label>
            <input id="appURL" placeholder="https://example.com" />
          </div>
        </div>

        <div class="modal-actions">
          <button id="cancelApp" class="btn cancel">Cancel</button>
          <button id="saveApp" class="btn primary">Add App</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
